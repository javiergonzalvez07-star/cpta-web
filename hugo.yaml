baseURL: "https://javiergonzalvez07-star.github.io/"
canonifyURLs: true
relativeURLs: false
languageCode: "en-us"
title: "Hugo Profile"
theme: "hugo-profile"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: blog
      name: Blog
      title: Blog posts
      url: /blogs
      weight: 1

    - identifier: ensayos
      name: Ensayos
      title: Ensayos
      url: /ensayos/
      weight: 2


params:
  title: "Javier G. - Engineering & Physics"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/Logo_2.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Javier G. - Engineering & Physics" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Javier."
    subtitle: "Mathematical Engineering & Physics student"
    content: "Student interested in Data Science, physical simulations and scientific computing. I build projects combining theory and real-world data."
    image: /images/yo.jpeg
    bottomImage:
      enable: true
    button:
      enable: true
      name: "Resume"
      url: /cv.pdf
      download: true
      newPage: false

    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/javiergonzalvez07-star

        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/javier-gonzalvez-sempere-b526552b0/

  # About
  about:
    enable: true
    title: "About Me"
    content: |
      I am a first-year student in Mathematical Engineering and Physics with a strong interest in Data Science and physical simulations.

      I enjoy building end-to-end projects: from data collection and cleaning, to modeling, simulation and decision-making.

      I regularly publish my work on GitHub and LinkedIn, and I am focused on developing a strong technical profile for future internships.

    skills:
      enable: true
      items:
        - Python
        - pandas
        - NumPy
        - scikit-learn
        - matplotlib
        - Data Analysis
        - Numerical Simulation


  # Experience
  experience:
    enable: true
    title: "Leadership & Initiatives"
    items:
      - company: "Applied Technical Projects Club"
        companyUrl: "https://javiergonzalvez07-star.github.io/"
        jobs:
          - name: "Founder & Lead"
            date: "2025 - Present"
            content: |
              Founded and currently lead an interdisciplinary student initiative that brings together students from Mathematics, Physics, Telecommunications, Computer Science, and Data Science to develop applied technical projects beyond the classroom.
              - Designed the club structure and project-based format
              - Coordinated recruitment, kickoff sessions, and faculty outreach
              - Led collaboration across different technical profiles on real-world problems
              


  # Education
  education:
    enable: true
    index: false
    items:
      - title: "Double Degree in Mathematical Engineering and Physics"
        school:
          name: "Universidad CEU San Pablo"
          url: "https://www.uspceu.com"
        date: "2025 - Present"
        content: |-
          First-year student focused on developing a strong applied profile in Data Science and scientific computing.

          Main interests:
            - Data analysis and machine learning
            - Numerical simulation and physical modeling
            - Operations Research and optimization
            - Scientific programming in Python

          Activities:
            - Personal projects published on GitHub
            - Technical posts on LinkedIn
            - Founder of Technical projects club
            - Physics Researcher at CEU San Pablo


  achievements:
    enable: true
    title: "Competitions"
    items:
      - title: "PLANCKS National 2026"
        content: "Placed 21st out of 162 teams in the Spanish national round of PLANCKS, competing on advanced theoretical physics problem-solving."
        url: "https://estudiantes.rsef.es/PreliminaresPLANCKS/"

      - title: "Imagin Challenge"
        content: "Developed and presented a sustainable business idea in a competition focused on innovation, entrepreneurship, and real-world impact."
        url: "https://www.imagin.com/imaginplanetchallenge"

  # projects
  projects:
    enable: true
    items: 
      - title: "F1 Pit-Stop Strategy: Simulation + Real-Data Validation"
        content: "A simplified physics-based race simulator with tire degradation + pit-loss tradeoffs, validated against modern F1 race data."
        image: /images/projects/f1.png
        featured:
          name: "Know more"
          link: "/projects/f1/"
        badges:
         - "Python"
         - "NumPy"
         - "pandas"
         - "Simulation"
         - "Data Validation"

      - title: "Bank Customer Churn Prediction"
        content: "From raw customer data to an interpretable churn model, with metrics chosen for business decisions."
        image: /images/projects/Banco.png
    
        featured:
          name: "Know more"
          link: "/projects/bank-churn/"


        badges:
          - "Python"
          - "pandas"
          - "scikit-learn"

      - title: "Chaos ≠ Randomness"
        content: "Time-series comparison of random, periodic and chaotic dynamics (logistic map + double pendulum)."  
        image: /images/projects/caos.png

        featured:
          name: "Know more"
          link: "/projects/caos/"
        badges:
          - "Simulation"
          - "Time Series"
          - "Dynamical Systems"

      - title: "Smart Plant Monitoring: IoT Data Collection in Real Conditions"
        content: "An ESP32-based plant monitoring system to study soil moisture and environmental conditions, focused on real-world data collection challenges."
        image: /images/projects/planta.png
        featured:
           name: "Know more"
           link: "/projects/planta/"
        badges:
          - "Python"
          - "ESP32"
          - "IoT"
          - "Sensors"
          - "Data Analysis"
          - "Data Recollection"


      - title: "Free Fall with Linear Drag"
        content: "Physical modeling and numerical simulation of vertical motion with linear air resistance, comparing analytical and numerical terminal velocity."
        image: /images/projects/Caida.png
        featured:
          name: "Know more"
          link: "/projects/caida/"
        badges:
          - "Physics"
          - "Simulation"
          - "ODEs"
          - "Python"

      - title: "Supermarket Optimization (DS + OR + Physics)"
        content: "End-to-end study of a supermarket: EDA/cleaning, queueing theory to size checkouts, demand forecasting with regression, product co-occurrence for store layout, and energy optimization of refrigeration via predictive control (MPC)."
        image: /images/projects/Supermercado.png
        featured:
          name: "Know more"
          link: "/projects/supermercado/"
        badges:
          - "EDA"
          - "Queueing"
          - "Forecasting"
          - "Market Basket"
          - "MPC"
          
      - title: "Road Safety Analysis: Mathematical Modeling of Braking Dynamics"
        content: "Developed a Python-based simulation to analyze how road friction and human reaction time affect collision speeds in highway and urban environments. The study provides data-driven insights into infrastructure investment by identifying critical safety thresholds for different pavement materials."
        image: /images/projects/seguridad_vial.png
        featured:
          name: "Know more"
          link: "/projects/coche/"
        badges:
          - "Physics"
          - "Simulation"
          - "Python"
      




  contact:
    enable: true
    content: "Feel free to reach out for internships, collaborations or questions about my projects: javier.gonzalvez07@gmail.com"
    btnName: "Get in touch on linkedin"
    btnLink: "https://www.linkedin.com/in/javier-gonzalvez-sempere-b526552b0/"




  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: "https://github.com/javiergonzalvez07-star"
      linkedin: "https://www.linkedin.com/in/javier-gonzalvez-sempere-b526552b0/"

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    pageNotFound: "Page not found"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

