{{ define "main" }}
<section class="py-5">
  <div class="container" style="max-width: 860px;">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <article>
          <header class="mb-5">
            <h1 class="fw-bold mb-2">{{ .Title }}</h1>
            <p class="text-muted small mb-0">
              {{ .Date.Format "02 Jan 2006" }}
            </p>
          </header>

          <div class="content">
            {{ .Content }}
          </div>

          <div class="mt-5 pt-3 border-top">
            {{ with site.GetPage "section" "ensayos" }}
              <a href="{{ .RelPermalink }}" class="text-decoration-none">
                ← Volver a Ensayos
              </a>
            {{ end }}
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
{{ end }}
